  <!-- ── CONTENIDO ── -->
  <main class="main-content">
    <section class="section active">
      <div class="section-header">
        <h2>Habilidades <span class="red">técnicas</span></h2>
        <div class="underline-red"></div>
      </div>

      <div class="skills-container">
        <div class="skills-group">
          <h3 class="skills-group-title"><i class="fas fa-code"></i> Frontend</h3>
          <div class="skills-list">
            <div class="skill-item">
              <span class="skill-name"><i class="fab fa-html5"></i> HTML5</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 60%"></div></div>
            </div>
            <div class="skill-item">
              <span class="skill-name"><i class="fab fa-css3-alt"></i> CSS3</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 70%"></div></div>
            </div>
            <div class="skill-item">
              <span class="skill-name"><i class="fab fa-js"></i> JavaScript</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 30%"></div></div>
            </div>
          </div>
        </div>

        <div class="skills-group">
          <h3 class="skills-group-title"><i class="fas fa-server"></i> Backend</h3>
          <div class="skills-list">
            <div class="skill-item">
              <span class="skill-name"><i class="fab fa-node-js"></i> Node.js</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 50%"></div></div>
            </div>
            <div class="skill-item">
              <span class="skill-name"><i class="fas fa-database"></i> SQL</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 45%"></div></div>
            </div>
            <div class="skill-item">
              <span class="skill-name"><i class="fab fa-python"></i> Python</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 65%"></div></div>
            </div>
          </div>
        </div>

        <div class="skills-group">
          <h3 class="skills-group-title"><i class="fas fa-tools"></i> Herramientas</h3>
          <div class="skills-list">
            <div class="skill-item">
              <span class="skill-name"><i class="fab fa-git-alt"></i> Git</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 35%"></div></div>
            </div>
            <div class="skill-item">
              <span class="skill-name"><i class="fab fa-github"></i> GitHub</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 75%"></div></div>
            </div>
            <div class="skill-item">
              <span class="skill-name"><i class="fas fa-terminal"></i> Linux / Bash</span>
              <div class="skill-bar"><div class="skill-fill" style="--pct: 0%"></div></div>
            </div>
          </div>
        </div>
      </div>
    </section>
