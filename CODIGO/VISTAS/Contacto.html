<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto | Mi Portafolio</title>
  <link rel="stylesheet" href="../DISEÑO/Style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-bracket">&lt;</span>KYZK<span class="logo-bracket">/&gt;</span>
    </div>
    <ul class="nav-links">
      <li><a href="Index.html"       class="nav-btn">Inicio</a></li>
      <li><a href="QuienSoy.html"    class="nav-btn">¿Quién soy?</a></li>
      <li><a href="Habilidades.html" class="nav-btn">Habilidades</a></li>
      <li><a href="Proyectos.html"   class="nav-btn">Proyectos</a></li>
      <li><a href="Contacto.html"    class="nav-btn active">Contacto</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
  </nav>

  <!-- ── CONTENIDO ── -->
  <main class="main-content">
    <section class="section active">
      <div class="section-header">
        <h2>Ponte en <span class="red">contacto</span></h2>
        <div class="underline-red"></div>
      </div>

      <div class="contact-wrapper">
        <div class="contact-info">
          <p class="contact-intro">¿Tienes alguna pregunta o propuesta? No dudes en escribirme.</p>
          <ul class="contact-list">
            <li><i class="fas fa-envelope red"></i> <span>kl4yzk@gmail.com</span></li>
            <li><i class="fab fa-github red"></i>   <span>github.com/KillerYZK</span></li>
            <li><i class="fas fa-map-marker-alt red"></i> <span>Mexico</span></li>
          </ul>
        </div>

        <form class="contact-form" onsubmit="handleForm(event)">
          <div class="form-group">
            <label for="name">Nombre</label>
            <input type="text" id="name" placeholder="Tu nombre" required />
          </div>
          <div class="form-group">
            <label for="email">Correo</label>
            <input type="email" id="email" placeholder="tu@correo.com" required />
          </div>
          <div class="form-group">
            <label for="message">Mensaje</label>
            <textarea id="message" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
          </div>
          <button type="submit" class="btn-primary full-width">
            <i class="fas fa-paper-plane"></i> Enviar mensaje
          </button>
          <p class="form-status" id="formStatus"></p>
        </form>
      </div>
    </section>
  </main>

<!-- ── FOOTER ── -->
  <footer class="footer">
    <p>Esto es esto y eso es eso...<span class="red"> KYZK</span></p>
  </footer>

  <img src="../DISEÑO/GIFS/don.gif" class="corner-gif" alt="gif" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="../BACKEND/Backend.js"></script>
</body>
</html>
